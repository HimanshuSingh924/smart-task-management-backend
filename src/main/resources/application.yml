spring:
  application:
    name: smart-task-management

  data:
    mongodb:
      uri: ${MONGODB_URI}
	  auto-index-creation: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

# ── JWT Auth Starter Configuration ───────────────────────────────────────────
auth:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key}
    expiration: ${JWT_EXPIRATION:86400000}
    token-prefix: Bearer
    header-name: Authorization
    public-endpoints: >
      /api/v1/auth/**,
      /actuator/health,
      /swagger-ui/**,
      /swagger-ui.html,
      /v3/api-docs/**,
      /api-docs/**

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.taskmanager: INFO
    com.devlib.auth: DEBUG
    org.springframework.data.mongodb: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
